name: Bump Version

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install toml

      - name: Bump version
        id: bump
        run: |
          python << 'EOF'
          import toml
          import re
          import os

          bump_type = "${{ inputs.bump_type }}"

          # Read pyproject.toml
          with open("pyproject.toml", "r") as f:
              data = toml.load(f)

          current_version = data["project"]["version"]
          major, minor, patch = map(int, current_version.split("."))

          if bump_type == "major":
              major += 1
              minor = 0
              patch = 0
          elif bump_type == "minor":
              minor += 1
              patch = 0
          else:  # patch
              patch += 1

          new_version = f"{major}.{minor}.{patch}"

          # Update pyproject.toml
          data["project"]["version"] = new_version
          with open("pyproject.toml", "w") as f:
              toml.dump(data, f)

          # Update __init__.py
          init_file = "src/cellconsensus/__init__.py"
          with open(init_file, "r") as f:
              content = f.read()
          content = re.sub(
              r'__version__ = "[^"]*"',
              f'__version__ = "{new_version}"',
              content
          )
          with open(init_file, "w") as f:
              f.write(content)

          # Output for next steps
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"old_version={current_version}\n")
              f.write(f"new_version={new_version}\n")

          print(f"Bumped version: {current_version} -> {new_version}")
          EOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml src/cellconsensus/__init__.py
          git commit -m "Bump version to ${{ steps.bump.outputs.new_version }}"
          git push

      - name: Create tag
        run: |
          git tag "v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"

      - name: Summary
        run: |
          echo "## Version Bump Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Previous version:** ${{ steps.bump.outputs.old_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **New version:** ${{ steps.bump.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** v${{ steps.bump.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
